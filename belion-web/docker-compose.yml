services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "${PORT:-3333}:3333"
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: 3333
      LOG_LEVEL: info
      APP_KEY: ${APP_KEY:?APP_KEY is required}
      SESSION_DRIVER: cookie
      DB_CONNECTION: ${DB_CONNECTION:-postgres}
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${POSTGRES_USER:-belion}
      DB_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      DB_DATABASE: ${POSTGRES_DB:-belion}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USERNAME: ${SMTP_USERNAME:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      MAIL_FROM_ADDRESS: ${MAIL_FROM_ADDRESS:-sales@beliongroupe.com}
      CONTACT_NOTIFY_EMAIL: ${CONTACT_NOTIFY_EMAIL:-sales@beliongroupe.com}
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - belion_tmp:/app/tmp
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3333/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 25s

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-belion}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:-belion}
    volumes:
      - belion_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-belion} -d ${POSTGRES_DB:-belion}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  belion_tmp:
  belion_postgres:
